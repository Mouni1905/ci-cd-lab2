name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - run: npm install

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm test

      - name: Login to Docker Hub
  uses: docker/login-action@v2
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build Docker Image
  run: docker build -t ${{ secrets.DOCKER_USERNAME }}/lab2:latest .

- name: Push Docker Image
  run: docker push ${{ secrets.DOCKER_USERNAME }}/lab2:latest
